<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <div class="invite-box" onclick="openInvite()">
        💌 Tap to Open Invitation
    </div>
</div>

<!-- MUSIC -->
<button id="musicBtn">🎵</button>
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<!-- SCROLL -->
<div id="scrollWrapper" class="hidden">

    <div class="rod top"></div>

    <div class="scroll">
        <h1 id="names"></h1>
        <p class="subtitle">Together with their families</p>

        <p class="main-text">
            Request the honour of your presence at their wedding
        </p>

        <div class="details">
            <p><b>Date:</b> April 25, 2026</p>
            <p><b>Time:</b> 6:00 PM onwards</p>
            <p><b>Venue:</b> Grand Palace, Mumbai</p>
        </div>

        <iframe src="https://maps.google.com/maps?q=mumbai&output=embed"></iframe>

        <p class="footer">With love ❤️</p>
    </div>

    <div class="rod bottom"></div>

</div>

<canvas id="petals"></canvas>

<script src="script.js"></script>
</body>
</html>
